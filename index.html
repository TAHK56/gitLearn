<!doctype html>
<html class="no-js" lang="en">
	<head>
		<meta charset="utf-8">
		<title>Our first responsive web page with HTML5 and CSS3</title>
		<meta name="description" content="A basic responsive web page — an example from Chapter 1">
		<meta name="viewport" content="width=device-width,initial-scale=1.0">
		<link rel="stylesheet" href="css/styles.css">
	</head>
	<body>
		<div class="Header">
			<a href="/" class="LogoWrapper"><img src="images/SOC-Logo.png" alt="Scone O'clock logo"></a>
			<p class="Strap"><strong>Scones:</strong> the most resplendent of snacks</p>
		</div>
		<div class="IntroWrapper">
			<p class="IntroText">Occasionally maligned and misunderstood; the scone is a quintessentially <b>British</b> classic.</p>
			<div class="MoneyShot">
				<p class="ImageCaption"><em>Incredible scones</em>, picture from Wikipedia</p>
			</div>
		</div>
		<p><i>Recipe</i> and serving suggestions follow.</p>
		<div class="Ingredients">
			<h3 class="SubHeader">Ingredients</h3>
			<ul></ul>
		</div>
		<div class="HowToMake">
			<h3 class="SubHeader">Method</h3>
			<ol class="MethodWrapper"></ol>
		</div>
	</body>
</html>
